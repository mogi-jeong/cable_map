<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>м „мЈј мўҢн‘ң ліҙм •</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
#toolbar {
    padding: 10px 16px; background: #0d0d1a; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #333; flex-wrap: wrap;
}
#toolbar h2 { font-size: 15px; color: #7eb8f7; margin-right: 8px; }
#status { font-size: 13px; color: #aaa; flex: 1; }
#offset-info { font-size: 13px; color: #ffd700; background: #1a1a00; padding: 6px 12px; border-radius: 6px; display: none; }
button {
    padding: 8px 16px; font-size: 13px; border-radius: 6px;
    cursor: pointer; border: none; font-weight: bold;
}
.btn-apply  { background: #4CAF50; color: white; display: none; }
.btn-cancel { background: #f44336; color: white; display: none; }
.btn-reset  { background: #555; color: #eee; }
#map { flex: 1; }
#log {
    position: fixed; bottom: 16px; right: 16px;
    background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace;
    font-size: 12px; padding: 10px; border-radius: 8px;
    max-width: 320px; display: none;
}
</style>
</head>
<body>
<div id="toolbar">
    <h2>рҹ“Қ м „мЈј мўҢн‘ң ліҙм •</h2>
    <div id="status">м „мЈјлҘј нҒҙлҰӯн•ҙм„ң м„ нғқн•ҳм„ёмҡ”</div>
    <div id="offset-info"></div>
    <button class="btn-apply"  id="btnApply"  onclick="applyOffset()">вң… м „мІҙ м Ғмҡ©</button>
    <button class="btn-cancel" id="btnCancel" onclick="cancelSelect()">вң– м·ЁмҶҢ</button>
    <button class="btn-reset"  onclick="loadAndRender()">рҹ”„ мғҲлЎңкі м№Ё</button>
</div>
<div id="map"></div>
<div id="log"></div>

<script>
var map = L.map('map').setView([37.44, 128.66], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'В© OpenStreetMap'
}).addTo(map);

var markers = [];
var selectedMarker = null;
var selectedNode = null;
var offsetLat = 0, offsetLng = 0;
var allNodes = [];

function log(msg) {
    var el = document.getElementById('log');
    el.style.display = 'block';
    el.textContent = msg;
}

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

function loadAndRender() {
    // кё°мЎҙ л§Ҳм»Ө м ңкұ°
    markers.forEach(function(m) { map.removeLayer(m); });
    markers = [];
    selectedMarker = null;
    selectedNode = null;
    offsetLat = 0; offsetLng = 0;

    document.getElementById('offset-info').style.display = 'none';
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';

    allNodes = JSON.parse(localStorage.getItem('fiberNodes') || '[]')
        .filter(function(n) { return n.type === 'pole'; });

    if (allNodes.length === 0) {
        setStatus('вқҢ localStorageм—җ м „мЈј лҚ°мқҙн„° м—ҶмқҢ');
        return;
    }

    // м§ҖлҸ„ мӨ‘мӢ¬ мқҙлҸҷ
    var avgLat = allNodes.reduce(function(s,n){return s+n.lat;},0) / allNodes.length;
    var avgLng = allNodes.reduce(function(s,n){return s+n.lng;},0) / allNodes.length;
    map.setView([avgLat, avgLng], 14);

    allNodes.forEach(function(node) {
        var icon = L.divIcon({
            html: '<div style="width:12px;height:12px;background:#4a90e2;border:2px solid white;border-radius:50%;"></div>',
            className: '',
            iconSize: [12, 12],
            iconAnchor: [6, 6]
        });
        var m = L.marker([node.lat, node.lng], { icon: icon, draggable: false }).addTo(map);
        m.bindTooltip(node.name, { permanent: false, direction: 'top', offset: [0, -8] });

        m.on('click', function() { selectMarker(m, node); });
        m._nodeData = node;
        markers.push(m);
    });

    setStatus('м „мЈј ' + allNodes.length + 'к°ң лЎңл“ңлҗЁ вҖ” кё°мӨҖ м „мЈјлҘј нҒҙлҰӯн•ҳм„ёмҡ”');
}

function selectMarker(m, node) {
    // мқҙм „ м„ нғқ мҙҲкё°нҷ”
    if (selectedMarker) {
        selectedMarker.setIcon(L.divIcon({
            html: '<div style="width:12px;height:12px;background:#4a90e2;border:2px solid white;border-radius:50%;"></div>',
            className: '', iconSize: [12,12], iconAnchor: [6,6]
        }));
        selectedMarker.dragging.disable();
    }

    selectedMarker = m;
    selectedNode = node;

    // м„ нғқ л§Ҳм»Ө к°•мЎ°
    m.setIcon(L.divIcon({
        html: '<div style="width:18px;height:18px;background:#ff5722;border:3px solid white;border-radius:50%;box-shadow:0 0 8px #ff5722;"></div>',
        className: '', iconSize: [18,18], iconAnchor: [9,9]
    }));
    m.dragging.enable();

    m.off('dragend');
    m.on('dragend', function(e) {
        var newPos = e.target.getLatLng();
        offsetLat = newPos.lat - node.lat;
        offsetLng = newPos.lng - node.lng;

        var dNorth = Math.round(offsetLat * 111320);
        var dEast  = Math.round(offsetLng * 111320 * Math.cos(node.lat * Math.PI/180));

        document.getElementById('offset-info').style.display = 'block';
        document.getElementById('offset-info').textContent =
            'мҳӨн”„м…Ӣ: ' + (dNorth>0?'+':'') + dNorth + 'm (лӮЁл¶Ғ) / ' + (dEast>0?'+':'') + dEast + 'm (лҸҷм„ң)';

        document.getElementById('btnApply').style.display = 'inline-block';
        document.getElementById('btnCancel').style.display = 'inline-block';

        setStatus('"' + node.name + '" мқҙлҸҷ мҷ„лЈҢ вҖ” м „мІҙ м Ғмҡ©н•ҳл Өл©ҙ вң… лІ„нҠј нҒҙлҰӯ');
        log('кё°мӨҖ: ' + node.name + '\nмҳӨн”„м…Ӣ lat: ' + offsetLat.toFixed(7) + '\nмҳӨн”„м…Ӣ lng: ' + offsetLng.toFixed(7));
    });

    setStatus('"' + node.name + '" м„ нғқлҗЁ вҖ” л“ңлһҳк·ён•ҙм„ң мӢӨм ң мң„м№ҳлЎң мқҙлҸҷ');
    document.getElementById('btnCancel').style.display = 'inline-block';
}

function applyOffset() {
    if (offsetLat === 0 && offsetLng === 0) return;

    var allStored = JSON.parse(localStorage.getItem('fiberNodes') || '[]');
    var count = 0;
    allStored.forEach(function(n) {
        if (n.type === 'pole') {
            n.lat += offsetLat;
            n.lng += offsetLng;
            count++;
        }
    });
    localStorage.setItem('fiberNodes', JSON.stringify(allStored));

    log('вң… ' + count + 'к°ң м „мЈј мўҢн‘ң ліҙм • мҷ„лЈҢ');
    setStatus('вң… ' + count + 'к°ң м „мЈј мўҢн‘ң ліҙм • мҷ„лЈҢ вҖ” мқҙмқҢ v2м—җм„ң Ctrl+Shift+R н•ҳм„ёмҡ”!');
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';

    loadAndRender();
}

function cancelSelect() {
    if (selectedMarker) {
        // мӣҗлһҳ мң„м№ҳлЎң ліөк·Җ
        selectedMarker.setLatLng([selectedNode.lat, selectedNode.lng]);
        selectedMarker.setIcon(L.divIcon({
            html: '<div style="width:12px;height:12px;background:#4a90e2;border:2px solid white;border-radius:50%;"></div>',
            className: '', iconSize: [12,12], iconAnchor: [6,6]
        }));
        selectedMarker.dragging.disable();
        selectedMarker = null;
        selectedNode = null;
    }
    offsetLat = 0; offsetLng = 0;
    document.getElementById('offset-info').style.display = 'none';
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    setStatus('м·ЁмҶҢлҗЁ вҖ” лӢӨмӢң м „мЈјлҘј нҒҙлҰӯн•ҳм„ёмҡ”');
}

// мӢңмһ‘
loadAndRender();
</script>
</body>
</html>

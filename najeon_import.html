function log(msg) {
    document.getElementById('log').textContent += '\n' + msg;
}

function checkData() {
    document.getElementById('log').textContent = '== 현재 localStorage ==';
    var nodes = JSON.parse(localStorage.getItem('fiberNodes') || '[]');
    var conns = JSON.parse(localStorage.getItem('fiberConnections') || '[]');
    log('노드: ' + nodes.length + '개');
    log('연결: ' + conns.length + '개');
    var types = {};
    nodes.forEach(function(n) { types[n.type] = (types[n.type]||0)+1; });
    log('타입별: ' + JSON.stringify(types));
}

function importData() {
    document.getElementById('log').textContent = '임포트 시작...';
    var existing = JSON.parse(localStorage.getItem('fiberNodes') || '[]');
    // 기존 pole 타입 제거 후 새로 추가
    var nonPole = existing.filter(function(n) { return n.type !== 'pole'; });
    var merged = nonPole.concat(NEW_NODES);
    localStorage.setItem('fiberDataVersion', '3');
    localStorage.setItem('fiberNodes', JSON.stringify(merged));
    log('기존 pole 제거 후 재삽입');
    log('최종 노드: ' + merged.length + '개');
    log('✅ 완료! 이음 v2에서 Ctrl+Shift+R 하세요!');
}

function clearData() {
    if (confirm('기존 데이터 전체 초기화 후 나전간만 넣을까요?')) {
        localStorage.setItem('fiberDataVersion', '3');
        localStorage.setItem('fiberNodes', JSON.stringify(NEW_NODES));
        localStorage.removeItem('fiberConnections');
        document.getElementById('log').textContent = '✅ 초기화 후 임포트 완료! (' + NEW_NODES.length + '개)\nCtrl+Shift+R 하세요!';
    }
}

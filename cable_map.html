<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>광케이블 네트워크 관리</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* 상단 툴바 */
        .toolbar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 4px;
        }
        .toolbar-title {
            font-size: 13px;
            font-weight: 700;
            color: #333;
            margin-right: 8px;
            white-space: nowrap;
        }
        .toolbar-divider {
            width: 1px;
            height: 28px;
            background: #ddd;
            margin: 0 6px;
            flex-shrink: 0;
        }
        .tb-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            transition: background 0.15s;
            position: relative;
            flex-shrink: 0;
            gap: 2px;
        }
        .tb-btn:hover { background: rgba(0,0,0,0.07); }
        .tb-btn:active { background: rgba(0,0,0,0.13); }
        .tb-btn .tb-icon { font-size: 18px; line-height: 1; }
        .tb-btn .tb-label {
            font-size: 9px;
            color: #555;
            font-weight: 600;
            white-space: nowrap;
            line-height: 1;
        }
        .tb-btn.active { background: rgba(52,152,219,0.15); }
        /* 툴팁 */
        .tb-btn::after {
            content: attr(data-tip);
            position: absolute;
            top: 44px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 9999;
        }
        .tb-btn:hover::after { opacity: 1; }
        /* 취소 버튼 */
        .tb-cancel {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 4px;
        }
        .tb-cancel:hover { background: #c0392b; }
        /* 지도가 툴바 아래서 시작 */
        #map { padding-top: 48px; box-sizing: border-box; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .btn-datacenter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-junction {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-onu {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .btn-subscriber {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        .btn-cancel {
            background: #95a5a6;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        
        .btn-save {
            background: #27ae60;
            color: white;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        
        .btn-close {
            background: #95a5a6;
            color: white;
        }
        
        .menu-modal .modal-content {
            padding: 20px 20px 16px;
            max-width: 320px;
        }
        .menu-modal .modal-content h2 {
            font-size: 13px;
            color: #888;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .menu-modal #menuButtons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .menu-modal .menu-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            aspect-ratio: 1;
            padding: 10px 4px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            background: #fafafa;
            color: #444;
            transition: all 0.15s;
            margin: 0;
        }
        .menu-modal .menu-btn:hover {
            background: #f0f4ff;
            border-color: #b0c4f8;
            color: #2255cc;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .menu-modal .menu-btn.danger {
            border-color: #fcd5d5;
            color: #c0392b;
        }
        .menu-modal .menu-btn.danger:hover {
            background: #fff0f0;
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .menu-modal .menu-btn svg { flex-shrink: 0; }
        .menu-modal .btn-close {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 9px;
            background: none;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all 0.15s;
        }
        .menu-modal .btn-close:hover { background: #f5f5f5; color: #444; }
        
        .connection-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }
        
        .fiber-cores {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .fiber-core-btn {
            padding: 8px 12px;
            border: 2px solid #3498db;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .fiber-core-btn.selected {
            background: #3498db;
            color: white;
        }
        
        .status-message {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            z-index: 3000;
            display: none;
        }
        
        .status-message.active {
            display: block;
        }
        
        /* 전주 임포트 진행바 */
        #importProgressOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 99999;
            align-items: center;
            justify-content: center;
        }
        #importProgressOverlay.active {
            display: flex;
        }
        #importProgressBox {
            background: #fff;
            border-radius: 12px;
            padding: 32px 40px;
            min-width: 360px;
            max-width: 480px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.28);
            text-align: center;
        }
        #importProgressTitle {
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 18px;
            font-family: 'Malgun Gothic', sans-serif;
        }
        #importProgressTrack {
            width: 100%;
            height: 14px;
            background: #e9ecef;
            border-radius: 7px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #importProgressFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 7px;
            transition: width 0.15s ease;
        }
        #importProgressLabel {
            font-size: 13px;
            color: #7f8c8d;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 커스텀 마커 스타일 */
        .custom-marker {
            text-align: center;
            position: relative;
            display: inline-block;
        }
        
        .marker-icon {
            width: 24px;
            height: 24px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-weight: bold;
            color: white;
            margin: 0 auto;
        }
        
        .marker-label {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 3px;
            padding: 2px 6px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 3px;
            font-size: 11px;
            white-space: nowrap;
            font-weight: bold;
        }
        
        /* 연결선 라벨 스타일 */
        .connection-label {
            font-size: 11px;
            font-weight: bold;
            color: #c0392b;
            white-space: nowrap;
            text-align: center;
            text-shadow: 0 0 3px white, 0 0 3px white, 0 0 3px white;
            pointer-events: none;
        }

        /* ===== A-STYLE MODAL SYSTEM ===== */
        .modal-a .modal-content {
            padding: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 64px rgba(0,0,0,0.22);
            display: flex;
            flex-direction: column;
        }
        .a-mhd {
            flex-shrink: 0;
            padding: 20px 26px 16px;
            border-bottom: 1.5px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .a-mhd h2 { font-size: 17px; font-weight: 700; color: #16213e; margin: 0; flex: 1; }
        .a-mbd { flex: 1; padding: 20px 26px; overflow-y: auto; }
        .a-mft {
            flex-shrink: 0;
            padding: 14px 26px 20px;
            border-top: 1.5px solid #f0f0f0;
            display: flex;
            gap: 8px;
        }
        .a-lbl {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 7px;
        }
        .modal-a .form-group { margin-bottom: 16px; }
        .modal-a .form-group input,
        .modal-a .form-group select,
        .modal-a .form-group textarea {
            background: #f5f6f8;
            border: 1.5px solid transparent;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            color: #222;
            transition: border-color .15s, background .15s, box-shadow .15s;
        }
        .modal-a .form-group input:focus,
        .modal-a .form-group select:focus,
        .modal-a .form-group textarea:focus {
            outline: none;
            background: #fff;
            border-color: #1a6fd4;
            box-shadow: 0 0 0 3px rgba(26,111,212,.1);
        }
        .a-btn {
            flex: 1;
            padding: 11px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
            white-space: nowrap;
        }
        .a-btn:hover  { opacity: .85; transform: translateY(-1px); }
        .a-btn:active { opacity: 1; transform: none; }
        .a-btn-primary { background: #1a6fd4; color: #fff; }
        .a-btn-green   { background: #27ae60; color: #fff; }
        .a-btn-danger  { background: #e74c3c; color: #fff; }
        .a-btn-ghost   { background: #f0f1f3; color: #555; }
        .a-btn-purple  { background: #9b59b6; color: #fff; }
        .a-btn-orange  { background: #e67e22; color: #fff; }
        /* 연결 카드 */
        .a-conn-card {
            background: #f9fafb;
            border: 1.5px solid #ebebeb;
            border-left-width: 4px;
            border-radius: 10px;
            padding: 11px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color .15s, box-shadow .15s;
        }
        .a-conn-card:hover {
            border-top-color: #d0dde8;
            border-right-color: #d0dde8;
            border-bottom-color: #d0dde8;
            box-shadow: 0 2px 10px rgba(0,0,0,.07);
        }
        .a-conn-core { font-size: 11px; color: #aaa; margin-top: 5px; letter-spacing: .05em; text-transform: uppercase; }
        /* OFD 카드 */
        .a-ofd-card {
            background: #fff;
            border: 1.5px solid #e8eaf0;
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.04);
        }
        .a-ofd-badge {
            font-size: 12px;
            font-weight: 800;
            color: #1a6fd4;
            background: #e8f0fe;
            border-radius: 6px;
            padding: 4px 10px;
            flex-shrink: 0;
        }
        .a-ofd-card input,
        .a-ofd-card select {
            background: #f5f6f8;
            border: 1.5px solid transparent;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            flex: 1;
            min-width: 0;
            transition: border-color .15s;
        }
        .a-ofd-card input:focus,
        .a-ofd-card select:focus { outline: none; border-color: #1a6fd4; background: #fff; }
        .a-ofd-del {
            padding: 6px 12px;
            background: #fef0f0;
            color: #e74c3c;
            border: 1.5px solid #fcd5d5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .a-ofd-del:hover { background: #fee5e5; border-color: #e74c3c; }
        .a-ofd-sec {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #aaa;
            margin: 10px 0 6px;
        }
        .a-ofd-act {
            flex: 1;
            padding: 9px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .15s;
        }
        .a-ofd-act:hover { opacity: .82; }

    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="toolbar">
        <div style="display:flex;align-items:center;gap:8px;margin-right:4px;">
            <svg width="26" height="26" viewBox="0 0 40 40">
                <path d="M4,28 Q12,4 20,20 Q28,36 36,12" fill="none" stroke="#1a6fd4" stroke-width="3" stroke-linecap="round"/>
                <path d="M4,12 Q12,36 20,20 Q28,4 36,28" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
                <circle cx="4"  cy="28" r="2.5" fill="#1a6fd4"/>
                <circle cx="36" cy="12" r="2.5" fill="#1a6fd4"/>
                <circle cx="4"  cy="12" r="2"   fill="#e74c3c" opacity="0.8"/>
                <circle cx="36" cy="28" r="2"   fill="#e74c3c" opacity="0.8"/>
            </svg>
            <span style="font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:17px;color:#1a6fd4;letter-spacing:-1px;">이음</span>
        </div>
        <div class="toolbar-divider"></div>

        <!-- 장비 추가 -->
        <button class="tb-btn" onclick="startAddingNode('datacenter')" data-tip="국사장비 추가">
            <svg width="22" height="22" viewBox="0 0 40 40">
                <rect x="3" y="3" width="34" height="34" rx="3" fill="white" stroke="#1a6fd4" stroke-width="2.5"/>
                <rect x="7" y="8"  width="26" height="4" rx="1" fill="#1a6fd4" opacity="0.8"/>
                <rect x="7" y="14" width="26" height="4" rx="1" fill="#1a6fd4" opacity="0.6"/>
                <rect x="7" y="20" width="26" height="4" rx="1" fill="#1a6fd4" opacity="0.4"/>
                <rect x="7" y="26" width="26" height="4" rx="1" fill="#1a6fd4" opacity="0.2"/>
                <circle cx="30" cy="10" r="1.5" fill="#00cc66"/>
                <circle cx="30" cy="16" r="1.5" fill="#ff9900"/>
                <circle cx="30" cy="22" r="1.5" fill="#00cc66"/>
                <circle cx="30" cy="28" r="1.5" fill="#00cc66"/>
            </svg>
            <span class="tb-label">국사</span>
        </button>
        <button class="tb-btn" onclick="startAddingNode('junction')" data-tip="함체 추가">
            <svg width="22" height="22" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="#e8f0fe" stroke="#1a6fd4" stroke-width="2.5"/>
                <polygon points="20,20 7,11 7,29" fill="#1a6fd4"/>
                <polygon points="20,20 33,11 33,29" fill="#1a6fd4"/>
                <circle cx="20" cy="20" r="2.5" fill="white" stroke="#1a6fd4" stroke-width="1.5"/>
            </svg>
            <span class="tb-label">함체</span>
        </button>
        <button class="tb-btn" onclick="startAddingNode('onu')" data-tip="ONU 추가">
            <svg width="26" height="20" viewBox="0 0 48 36">
                <rect x="2" y="4" width="44" height="28" rx="3" fill="#d0d8e4" stroke="#5577aa" stroke-width="2"/>
                <line x1="10" y1="7" x2="10" y2="29" stroke="#8899bb" stroke-width="1"/>
                <line x1="16" y1="7" x2="16" y2="29" stroke="#8899bb" stroke-width="1"/>
                <line x1="22" y1="7" x2="22" y2="29" stroke="#8899bb" stroke-width="1"/>
                <line x1="28" y1="7" x2="28" y2="29" stroke="#8899bb" stroke-width="1"/>
                <line x1="34" y1="7" x2="34" y2="29" stroke="#8899bb" stroke-width="1"/>
                <line x1="40" y1="7" x2="40" y2="29" stroke="#8899bb" stroke-width="1"/>
                <rect x="16" y="0" width="5" height="5" rx="1" fill="#5577aa"/>
                <rect x="27" y="0" width="5" height="5" rx="1" fill="#5577aa"/>
                <circle cx="42" cy="12" r="2" fill="#00dd66"/>
                <circle cx="42" cy="24" r="2" fill="#ffaa00"/>
            </svg>
            <span class="tb-label">ONU</span>
        </button>
        <button class="tb-btn" onclick="startAddingNode('subscriber')" data-tip="가입자 추가">
            <svg width="22" height="22" viewBox="0 0 40 40">
                <rect x="4" y="4" width="32" height="22" rx="3" fill="#e8f0fe" stroke="#1a6fd4" stroke-width="2"/>
                <line x1="10" y1="12" x2="30" y2="12" stroke="#1a6fd4" stroke-width="1.5" opacity="0.6"/>
                <line x1="10" y1="16" x2="24" y2="16" stroke="#1a6fd4" stroke-width="1.5" opacity="0.4"/>
                <line x1="10" y1="20" x2="27" y2="20" stroke="#1a6fd4" stroke-width="1.5" opacity="0.3"/>
                <rect x="18" y="26" width="4" height="4" fill="#1a6fd4"/>
                <rect x="13" y="30" width="14" height="3" rx="1" fill="#1a6fd4"/>
                <circle cx="34" cy="24" r="2" fill="#00dd66"/>
            </svg>
            <span class="tb-label">가입자</span>
        </button>
        <button class="tb-btn" onclick="startAddingNode('cctv')" data-tip="CCTV 추가">
            <svg width="26" height="18" viewBox="0 0 56 36">
                <polygon points="41,18 56,6 56,30" fill="#1a6fd4" opacity="0.1"/>

        <div class="modal-content" style="max-width:380px;">
            <h2>🔢 코어 수 변경</h2>
            <p id="coreChangeInfo" style="color:#666; margin-bottom:15px; font-size:14px;"></p>
            <div class="form-group">
                <label>새 코어 수 선택</label>
                <div class="fiber-cores" id="coreChangeSelection"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="confirmCoreChange()">변경</button>
                <button class="btn-close" onclick="closeCoreChangeModal()">취소</button>
            </div>
        </div>
    </div>

    <div class="status-message" id="statusMessage"></div>

    <!-- 전주 임포트 진행바 오버레이 -->
    <div id="importProgressOverlay">
        <div id="importProgressBox">
            <div id="importProgressTitle">전주 임포트 중...</div>
            <div id="importProgressTrack">
                <div id="importProgressFill"></div>
            </div>
            <div id="importProgressLabel">0 / 0</div>
        </div>
    </div>

    <!-- 함체 위치 확인 팝업 -->
    <div id="junctionConfirmPopup" style="display:none;position:absolute;z-index:9999;background:white;border:1px solid #ccc;border-radius:8px;padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,0.18);min-width:180px;">
        <div style="font-size:13px;color:#333;margin-bottom:10px;">이 위치에 함체를 추가할까요?</div>
        <div style="display:flex;gap:8px;">
            <button id="junctionConfirmYes" style="flex:1;padding:7px 0;background:#3498db;color:white;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold;">추가</button>
            <button id="junctionConfirmNo"  style="flex:1;padding:7px 0;background:#95a5a6;color:white;border:none;border-radius:5px;cursor:pointer;font-size:13px;">취소</button>
        </div>
    </div>
    
    <!-- 카카오맵 SDK -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4f478e9f00aaf4d8b3432db26f3d1aa2&autoload=false"></script>
    <!-- SheetJS (Excel 출력) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <!-- 카카오맵 shim + 앱 모듈 -->
    <script src="cable_map_shim.js"></script>
    <script src="cable_map_data.js"></script>
    <script src="cable_map_map.js"></script>
    <script src="cable_map_ofd.js"></script>
    <script src="cable_map_ui.js"></script>
    <script src="cable_map_wiremap.js"></script>

    <!-- 앱 시작 -->

        kakao.maps.load(function() {
            initMap();
        });
    </script>

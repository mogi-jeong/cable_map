<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Gemini TBA Test</title>
<style>body{display:flex;gap:40px;padding:40px;background:#f0f0f0;flex-wrap:wrap;align-items:flex-start;}
.box{background:white;padding:20px;border-radius:8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.box h3{margin:0 0 10px;font-size:14px;color:#666;}</style>
</head><body>

<div class="box">
<h3>원본 (200x220 viewBox)</h3>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="220" viewBox="0 0 200 220">
  <line x1="70" y1="70" x2="70" y2="30" stroke="black" stroke-width="2"/>
  <line x1="70" y1="150" x2="70" y2="190" stroke="black" stroke-width="2"/>
  <line x1="60" y1="110" x2="30" y2="110" stroke="black" stroke-width="2"/>
  <line x1="150" y1="110" x2="170" y2="110" stroke="black" stroke-width="2"/>
  <polygon points="70,80 70,140 140,110" fill="#E53935" stroke="#E53935" stroke-width="20" stroke-linejoin="round"/>
  <polygon points="90,100 90,120 115,110" fill="#1E88E5" stroke="#1E88E5" stroke-width="8" stroke-linejoin="round"/>
  <text x="85" y="45" font-family="sans-serif" font-size="40" fill="black">B2</text>
  <text x="85" y="210" font-family="sans-serif" font-size="40" fill="black">B1</text>
  <text x="145" y="85" font-family="sans-serif" font-size="40" fill="black">B0</text>
</svg>
</div>

<div class="box">
